name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (optional; defaults to pyproject.toml)"
        required: false
        type: string
      docker_tag:
        description: "Docker tag to publish (optional; defaults to version)"
        required: false
        type: string

jobs:
  release:
    name: Publish to PyPI and Docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        id: vars
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          input_version = (os.environ.get("INPUT_VERSION") or "").strip()
          input_docker_tag = (os.environ.get("INPUT_DOCKER_TAG") or "").strip()

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          py_version = pyproject["project"]["version"]

          release_version = input_version or py_version
          if input_version and release_version != py_version:
              raise SystemExit(
                  "Version input does not match pyproject.toml: "
                  f"input={input_version}, pyproject={py_version}"
              )

          docker_tag = input_docker_tag or release_version

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as f:
              f.write(f"version={release_version}\n")
              f.write(f"docker_tag={docker_tag}\n")

          print(f"Resolved release version: {release_version}")
          print(f"Resolved docker tag: {docker_tag}")
          PY

      - name: Run tests (pre-publish)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest
          pytest -q

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            adxzer/defend:${{ steps.vars.outputs.docker_tag }}

