name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with ruff
        run: |
          ruff check defend_api client tests

  tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov httpx
          pip install .

      - name: Run unit and integration tests with coverage
        run: |
          pytest -m "unit or integration" --cov=defend_api --cov=client --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  api-tests:
    runs-on: ubuntu-latest
    needs: tests
    env:
      API_BASE_URL: http://127.0.0.1:8000
      DEFEND_ENV: test

    services:
      app:
        image: python:3.12-slim
        ports:
          - 8000:8000
        options: >-
          --health-cmd="curl --fail http://127.0.0.1:8000/health || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
        command: >
          sh -c "
          python -m pip install --upgrade pip &&
          pip install uvicorn defend-api &&
          uvicorn defend_api.main:app --host 0.0.0.0 --port 8000
          "

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run API tests
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
        run: |
          pytest -m api

