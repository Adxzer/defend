name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check defend_api defend

  typecheck:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Compile (import sanity)
        run: |
          python -m compileall defend_api defend

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run pytest (E2E)
        run: |
          pytest -q

  pr-template-check:
    name: PR Template Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate required PR sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import os

          body = os.environ.get("PR_BODY") or ""
          required_sections = [
              "## Summary",
              "## Motivation and context",
              "## Testing",
              "## Security considerations",
              "## Checklist",
          ]

          missing = [s for s in required_sections if s not in body]
          if missing:
              raise SystemExit("Missing required PR sections:\n" + "\n".join(missing))

          print("PR template checks passed")
          PY

